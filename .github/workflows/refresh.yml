name: refresh-nameservers
on:
  push:
    branches: [main]
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python public_dns_block/scrape_dns_servers.py

      - name: Commit updated lists
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            nameservers.txt
            stats.txt
          default_author: github_actions
          message: "refresh nameservers.txt [automated]"
